version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-bd-products
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: bd-products
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: coti
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api-network


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-app
    ports:
      - "5052:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: coti@email.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - api-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:

networks:
  api-network:
    driver: bridge

